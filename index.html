<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Terra - Unity 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .badge {
            background-color: rgba(88, 166, 255, 0.15);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            color: #ffffff;
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 32px;
        }

        .itch-widget-wrapper {
            display: flex;
            justify-content: center;
            margin: 32px 0;
        }

        iframe {
            border: none;
            border-radius: 10px;
            max-width: 100%;
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">Projeto em Unity</span>
        
        <h1>Simulação do Globo</h1>
        
        <p>Explore a dinâmica dos movimentos de rotação e translação desenvolvida em Unity 3D, simulando o comportamento da Terra no espaço.</p>

        <div class="itch-widget-wrapper">
            <iframe frameborder="0" src="https://itch.io/embed/4541367" width="552" height="167">
                <a href="https://guilhermearaujo.itch.io/terraweb">TerraWeb by guilhermearaujo</a>
            </iframe>
        </div>

        <footer>
            Desenvolvido com Unity &hearts;
        </footer>
    </div>

</body>
</html>
